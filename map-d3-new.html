<!-- D3.js REAL EUROPE MAP -->
<div id="d3Map" style="width: 100%; height: 450px; background: #1e293b; border-radius: 8px;"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<script>
(function() {
    const width = 800, height = 450;
    const svg = d3.select("#d3Map")
        .append("svg")
        .attr("viewBox", `0 0 ${width} ${height}`)
        .attr("width", "100%")
        .attr("height", "100%");
    
    // Europe-focused projection
    const projection = d3.geoMercator()
        .center([10, 52])
        .scale(700)
        .translate([width / 2, height / 2]);
    
    const path = d3.geoPath().projection(projection);
    
    // Country name to code mapping
    const countryCodes = {
        "Norway": "NO", "Sweden": "SE", "Finland": "FI", "Denmark": "DK",
        "United Kingdom": "GB", "Ireland": "IE", "France": "FR", "Spain": "ES",
        "Portugal": "PT", "Italy": "IT", "Germany": "DE", "Netherlands": "NL",
        "Belgium": "BE", "Switzerland": "CH", "Austria": "AT",
        "Czech Republic": "CZ", "Poland": "PL", "Luxembourg": "LU",
        "Slovenia": "SI", "Croatia": "HR", "Greece": "GR",
        "Estonia": "EE", "Latvia": "LV", "Lithuania": "LT",
        "Hungary": "HU", "Slovakia": "SK", "Romania": "RO",
        "Bulgaria": "BG", "Serbia": "RS", "Bosnia and Herzegovina": "BA",
        "North Macedonia": "MK", "Albania": "AL", "Montenegro": "ME",
        "Moldova": "MD", "Ukraine": "UA", "Belarus": "BY",
        "Russia": "RU", "Iceland": "IS", "Malta": "MT", "Cyprus": "CY",
        "Turkey": "TR", "Georgia": "GE", "Armenia": "AM", "Azerbaijan": "AZ"
    };
    
    // Load world atlas
    d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(function(world) {
        const countries = topojson.feature(world, world.objects.countries).features;
        
        // Render all countries that have a code
        const euCountries = countries.filter(d => countryCodes[d.properties.name]);
        
        svg.selectAll("path.country")
            .data(euCountries)
            .join("path")
            .attr("class", "country")
            .attr("d", path)
            .attr("id", d => countryCodes[d.properties.name])
            .attr("data-name", d => d.properties.name)
            .on("click", function(event, d) {
                const code = countryCodes[d.properties.name];
                if (code && typeof toggleCountry === 'function') {
                    toggleCountry(code);
                }
            });
        
        // Add labels for main countries
        const labelData = [
            {code: "DE", name: "Germany"}, {code: "FR", name: "France"},
            {code: "ES", name: "Spain"}, {code: "IT", name: "Italy"},
            {code: "GB", name: "United Kingdom"}, {code: "PL", name: "Poland"},
            {code: "SE", name: "Sweden"}, {code: "NO", name: "Norway"},
            {code: "NL", name: "Netherlands"}, {code: "BE", name: "Belgium"},
            {code: "FI", name: "Finland"}, {code: "DK", name: "Denmark"},
            {code: "AT", name: "Austria"}, {code: "CZ", name: "Czech Republic"},
            {code: "CH", name: "Switzerland"}, {code: "PT", name: "Portugal"},
            {code: "IE", name: "Ireland"}, {code: "GR", name: "Greece"},
            {code: "HU", name: "Hungary"}, {code: "RO", name: "Romania"}
        ];
        
        // Calculate label positions from country centroids
        labelData.forEach(l => {
            const country = euCountries.find(c => c.properties.name === l.name);
            if (country) {
                const centroid = path.centroid(country);
                l.x = centroid[0];
                l.y = centroid[1];
            }
        });
        
        // Filter labels with valid positions
        const validLabels = labelData.filter(l => l.x && l.y);
        
        svg.selectAll("text.map-label")
            .data(validLabels)
            .join("text")
            .attr("class", "map-label")
            .attr("x", d => d.x)
            .attr("y", d => d.y)
            .text(d => d.code)
            .style("font-size", "10px")
            .style("fill", "#94a3b8")
            .style("font-weight", "600")
            .style("pointer-events", "none")
            .style("text-anchor", "middle")
            .style("text-shadow", "0 1px 2px rgba(0,0,0,0.8)");
            
    }).catch(err => {
        console.error("Map load error:", err);
        d3.select("#d3Map").html('<div style="padding: 40px; text-align: center; color: #94a3b8;">Unable to load map. Check internet connection and refresh.</div>');
    });
})();
</script>
